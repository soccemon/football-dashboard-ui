<div class="filter-bar">
  <!-- Season -->
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Season</mat-label>
    <mat-select [value]="selectedSeason" (selectionChange)="onSeasonChange($event.value)">
      <mat-option *ngFor="let s of seasons" [value]="s">{{ s }}</mat-option>
    </mat-select>
  </mat-form-field>

  <!-- League -->
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>League</mat-label>
    <mat-select
      [value]="selectedLeagueId"
      [disabled]="!selectedSeason"
      (selectionChange)="onLeagueChange($event.value)"
    >
      <mat-option *ngIf="loadingLeagues" disabled>Loading leagues…</mat-option>
      <mat-option *ngFor="let league of leagues" [value]="league.id">{{ league.name }}</mat-option>
    </mat-select>
  </mat-form-field>

  <!-- Team -->
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Team</mat-label>
    <mat-select
      [value]="selectedTeamId"
      [disabled]="!selectedLeagueId"
      (selectionChange)="onTeamChange($event.value)"
    >
      <mat-option [value]="null">All Teams</mat-option>
      <mat-option *ngIf="loadingTeams" disabled>Loading teams…</mat-option>
      <mat-option *ngFor="let team of teams" [value]="team.id">{{ team.name }}</mat-option>
    </mat-select>
  </mat-form-field>

  <!-- Position -->
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Position</mat-label>
    <mat-select [value]="selectedPosition" (selectionChange)="onPositionChange($event.value)">
      <mat-option *ngFor="let pos of positions" [value]="pos">{{ pos }}</mat-option>
    </mat-select>
  </mat-form-field>
</div>
